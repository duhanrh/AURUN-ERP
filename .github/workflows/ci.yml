name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint · types · tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AURUM_ENV: development
      AURUM_DB_HOST: localhost
      AURUM_DB_PORT: "5432"
      AURUM_DB_USER: aurum_app
      AURUM_DB_PASSWORD: aurum_app
      AURUM_DB_NAME: aurum_dev
      POSTGRES_SUPERUSER: postgres
      POSTGRES_SUPERUSER_PASSWORD: postgres
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Ruff (lint + formato)
        working-directory: backend
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy (tipado estático)
        working-directory: backend
        run: uv run mypy src

      - name: Bootstrap base de datos (rol + BD)
        run: psql -v ON_ERROR_STOP=0 -h localhost -U postgres -d postgres -f scripts/db/setup_dev.sql

      - name: Migraciones (Alembic)
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Pruebas (pytest, incluye aislamiento RLS)
        working-directory: backend
        run: uv run pytest -q

  frontend:
    name: Frontend (lint · build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build
