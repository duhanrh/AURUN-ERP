<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Aurum ERP — Sistema de Gestión Minera</title>
    <script>
      /* Fija el modo (claro/oscuro) ANTES del primer pintado para evitar el
         parpadeo. Arranca en claro; recuerda la elección en localStorage.
         El store de React (themeMode.ts) lee este mismo atributo al iniciar. */
      (function () {
        try {
          var t = localStorage.getItem('aurum-theme');
          document.documentElement.dataset.theme = t === 'dark' ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <style>
      /* Splash previo a la hidratación (evita el parpadeo antes del JS).
         La app React monta un splash idéntico y luego lo reemplaza. Los colores
         siguen el modo activo vía el atributo data-theme fijado arriba. */
      html {
        --boot-bg: #f5f6f8;
        --boot-ink: #1b1e27;
        --boot-dim: #98a0ad;
      }
      html[data-theme='dark'] {
        --boot-bg: #0a0a0b;
        --boot-ink: #f0ede8;
        --boot-dim: #4a4a5a;
      }
      html,
      body {
        margin: 0;
        background: var(--boot-bg);
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: radial-gradient(120% 90% at 50% 38%, rgba(201, 168, 76, 0.1), transparent 60%),
          var(--boot-bg);
        font-family: 'Space Grotesk', system-ui, sans-serif;
      }
      #boot .emblem {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 30px;
        color: #0a0a0b;
        background: linear-gradient(135deg, #e8c96a, #7a6228);
        box-shadow: 0 0 28px rgba(201, 168, 76, 0.35);
        animation: boot-pulse 2.2s ease-in-out infinite;
      }
      #boot .brand {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 2px;
        color: var(--boot-ink);
      }
      #boot .tagline {
        font-size: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--boot-dim);
      }
      @keyframes boot-pulse {
        0%,
        100% {
          box-shadow: 0 0 22px rgba(201, 168, 76, 0.28);
        }
        50% {
          box-shadow: 0 0 38px rgba(201, 168, 76, 0.5);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div class="emblem">⚜</div>
        <div class="brand">AURUM ERP</div>
        <div class="tagline">Mining Intelligence</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
